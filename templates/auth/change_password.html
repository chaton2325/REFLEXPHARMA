{% extends "base.html" %}

{% block title %}Changer le mot de passe - ReflexPharma{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-key fa-3x text-primary mb-3"></i>
                    <h2 class="fw-bold">Changer le mot de passe</h2>
                    <p class="text-muted">Sécurisez votre compte</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="old_password" class="form-label">Ancien mot de passe</label>
                        <input type="password" name="old_password" id="old_password" class="form-control" required placeholder="••••••••">
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">Nouveau mot de passe</label>
                        <input type="password" name="new_password" id="new_password" class="form-control" required placeholder="••••••••">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirmer le nouveau mot de passe</label>
                        <input type="password" name="confirm_password" id="confirm_password" class="form-control" required placeholder="••••••••">
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary py-2">Mettre à jour le mot de passe</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
