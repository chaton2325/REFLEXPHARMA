{% extends "base.html" %}

{% block title %}{{ title }} - ReflexPharma{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">{{ title }}</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nom du Poste</label>
                        <input type="text" name="nom" class="form-control" value="{{ poste.nom if poste else '' }}" required placeholder="ex: Pharmacien, Préparateur, Stagiaire...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description (optionnel)</label>
                        <textarea name="description" class="form-control" rows="3">{{ poste.description if poste else '' }}</textarea>
                    </div>

                    {% if current_user.role == 'superadmin' and poste %}
                    <hr>
                    <div class="mb-4">
                        <h6 class="fw-bold mb-3"><i class="fas fa-users-cog me-2"></i>Permissions par défaut pour ce poste</h6>
                        <div class="row">
                            {% for feature, label in features.items() %}
                            <div class="col-md-6 mb-2">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" name="perm_{{ feature }}" id="perm_{{ feature }}" 
                                           {% if poste_perms.get(feature) %}checked{% endif %}>
                                    <label class="form-check-label" for="perm_{{ feature }}">{{ label }}</label>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    {% endif %}

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('admin.list_postes') }}" class="btn btn-light border">Annuler</a>
                        <button type="submit" class="btn btn-primary">{{ 'Mettre à jour' if poste else 'Créer' }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
