{% extends "base.html" %}

{% block title %}{{ title }} - ReflexPharma{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('admin.list_groupes_fournisseurs') }}">Groupes</a></li>
                <li class="breadcrumb-item active">{{ title }}</li>
            </ol>
        </nav>
        
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">{{ title }}</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nom du Groupe</label>
                        <input type="text" name="nom" class="form-control" value="{{ groupe.nom if groupe else '' }}" placeholder="ex: Génériques, Grossistes..." required>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Coefficient par défaut</label>
                            <input type="number" step="0.01" name="coefficient_defaut" class="form-control" value="{{ groupe.coefficient_defaut if groupe else '1.0' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">TVA par défaut (%)</label>
                            <input type="number" step="0.01" name="tva_defaut" class="form-control" value="{{ groupe.tva_defaut if groupe else '20.0' }}" required>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('admin.list_groupes_fournisseurs') }}" class="btn btn-light border">Annuler</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
