{% extends "base.html" %}

{% block title %}{{ title }} - ReflexPharma{% endblock %}

{% block content %}
<div class="mb-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-1">
            <li class="breadcrumb-item"><a href="{{ url_for('admin.dashboard') }}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('admin.manage_stock') }}">Stock</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('admin.list_stock_reasons') }}">Raisons</a></li>
            <li class="breadcrumb-item active">{{ title }}</li>
        </ol>
    </nav>
    <h1 class="h3">{{ title }}</h1>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="nom" class="form-label fw-bold">Nom de la raison</label>
                        <input type="text" class="form-control" id="nom" name="nom" value="{{ reason.nom if reason else '' }}" required placeholder="Ex: Inventaire, Casse, Retour client...">
                    </div>
                    
                    <div class="mb-3">
                        <label for="type" class="form-label fw-bold">Type de mouvement</label>
                        <select class="form-select" id="type" name="type" required>
                            <option value="ajout" {{ 'selected' if reason and reason.type == 'ajout' else '' }}>Entrée / Ajout</option>
                            <option value="sortie" {{ 'selected' if reason and reason.type == 'sortie' else '' }}>Sortie</option>
                        </select>
                        <div class="form-text">Spécifiez si cette raison s'applique aux entrées ou aux sorties de stock.</div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="description" class="form-label fw-bold">Description (optionnel)</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ reason.description if reason else '' }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('admin.list_stock_reasons') }}" class="btn btn-light">Annuler</a>
                        <button type="submit" class="btn btn-primary px-4">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
