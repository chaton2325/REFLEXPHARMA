{% extends "base.html" %}

{% block title %}{{ title }} - ReflexPharma{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('admin.list_rayons') }}">Rayons</a></li>
                <li class="breadcrumb-item active">{{ title }}</li>
            </ol>
        </nav>
        
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">{{ title }}</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nom du Rayon</label>
                        <input type="text" name="nom" class="form-control" value="{{ rayon.nom if rayon else '' }}" placeholder="ex: Pharmacie, Parapharmacie..." required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Description</label>
                        <textarea name="description" class="form-control" rows="3">{{ rayon.description if rayon else '' }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('admin.list_rayons') }}" class="btn btn-light border">Annuler</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
