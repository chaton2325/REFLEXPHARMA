{% extends "base.html" %}

{% block title %}Paramètres de l'application - ReflexPharma{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1">
                <li class="breadcrumb-item"><a href="{{ url_for('admin.dashboard') }}">Dashboard</a></li>
                <li class="breadcrumb-item active">Paramètres</li>
            </ol>
        </nav>
        <h1 class="h3 mb-0">Paramètres de l'application</h1>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white">
                <h5 class="card-title mb-0"><i class="fas fa-hospital me-2 text-primary"></i>Informations de la Pharmacie</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="pharmacy_name" class="form-label fw-bold">Nom de la pharmacie</label>
                        <input type="text" class="form-control" id="pharmacy_name" name="pharmacy_name" value="{{ settings.pharmacy_name }}" placeholder="Ex: REFLEXPHARMA" required>
                        <div class="form-text">Ce nom apparaîtra en haut de tous les tickets de caisse.</div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Enregistrer les modifications
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
