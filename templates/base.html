<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}REFLEXPHARMA{% endblock %}</title>
    <style>
        :root {
            --bg: #f3f7f1;
            --surface: #ffffff;
            --surface-alt: #eef3f8;
            --text: #1b2b1f;
            --muted: #627064;
            --primary: #0f766e;
            --primary-dark: #0a5c56;
            --danger: #b42318;
            --success: #027a48;
            --accent: #ffbf00;
            --accent-soft: #fff2b8;
            --green: #3fa535;
            --border: #d8e3d7;
            --shadow: 0 18px 40px rgba(28, 48, 34, 0.08);
            --sidebar: #16331d;
            --sidebar-soft: #22472a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 191, 0, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(63, 165, 53, 0.1), transparent 24%),
                linear-gradient(180deg, #f8fbfd 0%, var(--bg) 100%);
            min-height: 100vh;
        }

        a {
            color: inherit;
        }

        .page {
            width: min(960px, calc(100% - 32px));
            margin: 0 auto;
            padding: 48px 0;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .flash-list {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .flash {
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .flash.error {
            border-color: rgba(180, 35, 24, 0.2);
            background: #fff3f2;
            color: var(--danger);
        }

        .flash.success {
            border-color: rgba(2, 122, 72, 0.18);
            background: #ecfdf3;
            color: var(--success);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--surface-alt);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #dfe9f1;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fff;
            color: var(--text);
            font: inherit;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .field + .field {
            margin-top: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        th {
            font-size: 0.82rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
        }

        td {
            font-size: 0.95rem;
        }

        .table-wrap {
            overflow-x: auto;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            background: #edf8ec;
            color: #246b20;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .badge.warn {
            background: #fff7df;
            color: #9a6a00;
        }

        .badge.muted {
            background: #eef3f8;
            color: #546576;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: end;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .section-head h1,
        .section-head h2,
        .section-head h3 {
            margin: 0;
        }

        .section-head p {
            margin: 8px 0 0;
            color: var(--muted);
            max-width: 720px;
            line-height: 1.6;
        }

        @media (max-width: 760px) {
            .page {
                width: min(100% - 20px, 100%);
                padding: 20px 0;
            }

            th,
            td {
                padding: 12px;
            }
        }

        @media (max-width: 640px) {
            .table-wrap table,
            .table-wrap thead,
            .table-wrap tbody,
            .table-wrap th,
            .table-wrap td,
            .table-wrap tr {
                display: block;
            }

            .table-wrap thead {
                display: none;
            }

            .table-wrap table {
                border-collapse: separate;
            }

            .table-wrap tbody {
                display: grid;
                gap: 12px;
            }

            .table-wrap tr {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 6px 0;
                box-shadow: var(--shadow);
            }

            .table-wrap td {
                display: grid;
                grid-template-columns: 112px minmax(0, 1fr);
                gap: 12px;
                padding: 10px 14px;
                border-bottom: 1px solid var(--border);
                align-items: start;
            }

            .table-wrap td:last-child {
                border-bottom: none;
            }

            .table-wrap td::before {
                content: attr(data-label);
                font-size: 0.78rem;
                font-weight: 800;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                color: var(--muted);
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <main class="{% block main_class %}page{% endblock %}">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-list">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
